name: CD

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    name: Export and publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: "4.6.3"
          use-dotnet: false
          include-templates: true

      - name: Import project
        run: godot --headless --import || true

      - name: Export Web
        run: mkdir -p build && godot --headless --export-release "Web" build/dodge-the-creepers.html

      - name: Create release archive
        run: cd build && zip -r ../game-export.zip .

      - name: Publish GitHub Release
        run: |
          TAG="build-${GITHUB_SHA:0:7}"
          gh release create "$TAG" game-export.zip \
            --title "Build ${GITHUB_SHA:0:7}" \
            --notes "Automated build from commit [\`${GITHUB_SHA:0:7}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})"
        env:
          GH_TOKEN: ${{ github.token }}
