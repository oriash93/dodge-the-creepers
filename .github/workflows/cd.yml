name: CD

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: Export and deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: "4.6.3"
          use-dotnet: false
          include-templates: true

      - name: Import project
        run: godot --headless --import || true

      - name: Export Web
        run: mkdir -p build && godot --headless --export-release "Web" build/index.html

      - name: Add headers
        run: |
          cat > build/_headers << 'EOF'
          /*
            Cross-Origin-Opener-Policy: same-origin
            Cross-Origin-Embedder-Policy: require-corp
          EOF

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy build --project-name=dodge-the-creepers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
