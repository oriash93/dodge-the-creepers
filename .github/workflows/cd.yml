name: CD

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    name: Bump version, export, and publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump version tag
        id: tag
        run: |
          LATEST=$(git tag --sort=-v:refname | grep '^v' | head -1 || echo "v0.0")
          IFS='.' read -r major minor <<< "${LATEST#v}"
          NEW_TAG="v${major}.$((minor + 1))"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Set up Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: "4.6.3"
          use-dotnet: false
          include-templates: true

      - name: Import project
        run: godot --headless --import || true

      - name: Export Web
        run: mkdir -p build && godot --headless --export-release "Web" build/dodge-the-creepers.html

      - name: Create release archive
        run: cd build && zip -r ../game-export.zip .

      - name: Publish GitHub Release
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" game-export.zip \
            --title "${{ steps.tag.outputs.tag }}" \
            --notes "Automated build from commit [\`${GITHUB_SHA:0:7}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})"
        env:
          GH_TOKEN: ${{ github.token }}
